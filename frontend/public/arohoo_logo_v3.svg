<svg width="100%" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
  </defs>

  <!-- Single text baseline, pin SVG inline-positioned by measuring char widths -->
  <!-- Fraunces 700 72px approximate char widths:
       A=52, r=36, o=46, h=46, o=46
       "Ar" = 88, "Aro" = 134, "Aroh" = 180
       pin replaces first 'o' after h? No: A-r-o-h-[pin]-o
       So: A(52)+r(36)+o(46)+h(46) = 180, pin width ~46, last o=46
       total = 180+46+46 = 272 → center at 340, start x = 340-136 = 204
  -->

  <g transform="translate(204, 15)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Full word as one text, but we'll split: "Aroh" + pin + "o" -->
    <!-- "Aroh" -->
    <text x="0" y="100" font-family="'Fraunces', Georgia, serif" font-weight="700" font-size="72" fill="#3C3489" letter-spacing="0" style="fill:rgb(206, 203, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Fraunces, Georgia, serif;font-size:72px;font-weight:700;text-anchor:start;dominant-baseline:auto">Aroh</text>

    <!-- Pin centered at x=203 (after "Aroh" ~180px wide, pin should sit like an 'o' ~46px wide, center=180+23=203) -->
    <g transform="translate(203, 12)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <circle cx="0" cy="28" r="23" fill="#534AB7" style="fill:rgb(83, 74, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
      <path d="M-11 46 Q0 70 11 46" fill="#534AB7" style="fill:rgb(83, 74, 183);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
      <circle cx="0" cy="27" r="9" fill="#EEEDFE" style="fill:rgb(238, 237, 254);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </g>

    <!-- last "o" at x=226 (180 + 46 = 226) -->
    <text x="226" y="100" font-family="'Fraunces', Georgia, serif" font-weight="700" font-size="72" fill="#3C3489" letter-spacing="0" style="fill:rgb(206, 203, 246);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Fraunces, Georgia, serif;font-size:72px;font-weight:700;text-anchor:start;dominant-baseline:auto">o</text>

    <!-- Tagline centered under the whole wordmark (~272/2 = 136) -->
    <text x="136" y="128" font-family="'Fraunces', Georgia, serif" font-size="11" font-weight="400" fill="#7F77DD" letter-spacing="4" text-anchor="middle" style="fill:rgb(175, 169, 236);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Fraunces, Georgia, serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">FIND YOUR PLACE</text>
  </g>
</svg>