services:
  - type: web
    name: arohoo-backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: sleep 5 && npx prisma migrate deploy && node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arohoo-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: arohoo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: CORS_ORIGIN
        value: "*" # Update this with your frontend URL once deployed

databases:
  - name: arohoo-db
    databaseName: arohoo
    user: arohoo_user
    plan: free
    region: oregon
