services:
  - type: web
    name: arohoo-backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && node src/server.js
    envVars:
      - key: DATABASE_URL
        sync: false # Provide your Neon connection string in the Render Dashboard
      - key: DIRECT_URL
        sync: false # Provide your Neon direct connection string
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: CORS_ORIGIN
        value: "*" # Update this with your frontend URL once deployed
